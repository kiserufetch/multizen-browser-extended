nodeLinker: node-modules

# Keep electron and other native deps inside the app workspace.
# electron-builder looks for electron under apps/desktop/node_modules
# and falls over with "Cannot compute electron version" when yarn 4
# hoists it to the root. nmHoistingLimits=workspaces gives each
# workspace its own node_modules.
nmHoistingLimits: workspaces

enableTelemetry: false
