appId: com.multizen.desktop
productName: MultiZen
directories:
  output: release
  buildResources: ../../build

files:
  - "out/**/*"
  - "package.json"
  - "!**/*.map"

mac:
  category: public.app-category.developer-tools
  icon: ../../build/icon.icns
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  identity: null

win:
  target:
    - nsis
  icon: ../../build/icon.png
  signAndEditExecutable: false

linux:
  target:
    - AppImage
  icon: ../../build/icons

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: multizenteam
  repo: multizen-browser
