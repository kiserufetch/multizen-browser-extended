name: Release

# Triggered by pushing a tag like v0.2.1. The tag value should match the
# version in apps/desktop/package.json — electron-builder reads from there.
#
# Manual trigger via workflow_dispatch is also supported for testing the
# pipeline without creating a public release (it still uploads to a draft
# release that you can delete after).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac:publish
          - os: windows-latest
            script: build:win:publish
          - os: ubuntu-latest
            script: build:linux:publish

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Enable Corepack (Yarn 4)
        run: |
          corepack enable
          corepack prepare yarn@4.5.0 --activate

      - name: Cache Yarn
        uses: actions/cache@v5
        with:
          path: |
            ~/.yarn/berry/cache
            .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build & publish
        env:
          # electron-builder picks this up to create the Release and
          # upload assets. Provided automatically by Actions.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip mac code signing / notarization — open-source MVP runs
          # unsigned. Users get a Gatekeeper warning on first launch.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn workspace @multizen/desktop ${{ matrix.script }}
